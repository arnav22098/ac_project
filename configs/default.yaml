experiment_name: default
seed: 1337
device: cpu

data:
  output_dir: data/default
  delta_p: 0x0040
  rounds: [3, 4, 5, 6, 7, 8]
  train_size: 12000
  val_size: 3000
  test_size: 3000
  key_schedule:
    mode: fixed
    key: [0x1918, 0x1110, 0x0908, 0x0100]

representations:
  - delta
  - delta_stats
  - concat
  - joint

training:
  epochs: 16
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  early_stopping_patience: 4
  scheduler_patience: 1
  scheduler_factor: 0.5

evaluation:
  train_seeds: [1337, 2027]
  effective_balanced_accuracy: 0.60
  effective_roc_auc: 0.60
  minimum_effective_seed_count: 2

models:
  - mlp
  - cnn
  - siamese

results:
  output_dir: results/default
