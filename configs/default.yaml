experiment_name: default
seed: 1337
device: cpu

data:
  output_dir: data/default
  delta_p: 0x0040
  rounds: [3, 4, 5, 6, 7, 8]
  train_size: 12000
  val_size: 3000
  test_size: 3000
  key_schedule:
    mode: fixed
    key: [0x1918, 0x1110, 0x0908, 0x0100]

representations:
  - delta
  - concat
  - joint

training:
  epochs: 12
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  early_stopping_patience: 4

models:
  - mlp
  - cnn
  - siamese

results:
  output_dir: results/default
