experiment_name: smoke
seed: 7
device: cpu

data:
  output_dir: data/smoke
  delta_p: 0x0040
  rounds: [3, 4]
  train_size: 512
  val_size: 128
  test_size: 128
  key_schedule:
    mode: fixed
    key: [0x1918, 0x1110, 0x0908, 0x0100]

representations:
  - delta
  - concat
  - joint

training:
  epochs: 2
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  early_stopping_patience: 2

models:
  - mlp
  - cnn
  - siamese

results:
  output_dir: results/smoke
